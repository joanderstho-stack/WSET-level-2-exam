<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WSET Level 2 Full Mock Test</title>
    <style>
        :root {
            --wset-blue: #004b8d;
            --wset-gold: #c5a059;
            --bg-light: #f4f7f6;
            --text-dark: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            background-color: var(--wset-blue);
            color: white;
            width: 100%;
            padding: 20px 0;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .container {
            width: 95%;
            max-width: 600px;
            margin-top: 20px;
            padding-bottom: 40px;
        }

        .nav-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background-color: var(--wset-blue);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover { background-color: #003566; }

        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .flashcard-content {
            font-size: 1.4rem;
            color: var(--wset-blue);
            font-weight: bold;
            line-height: 1.4;
        }

        .options {
            text-align: left;
            margin-top: 20px;
        }

        .option-btn {
            display: block;
            width: 100%;
            text-align: left;
            margin-bottom: 12px;
            background: #f0f0f0;
            color: var(--text-dark);
            padding: 15px;
            font-size: 1rem;
            border: 1px solid #ddd;
        }

        .correct { background-color: #d4edda !important; border-color: #c3e6cb !important; }
        .incorrect { background-color: #f8d7da !important; border-color: #f5c6cb !important; }

        .hidden { display: none; }
        #question-counter { font-size: 0.9rem; color: #666; margin-bottom: 10px; }

        @media (max-width: 480px) {
            .option-btn { font-size: 0.9rem; padding: 12px; }
            .card { padding: 15px; }
        }
    </style>
</head>
<body>

<header>
    <h1>WSET Level 2 Master Trainer</h1>
</header>

<div class="container">
    <div class="nav-buttons">
        <button onclick="showSection('quiz')">Mock Test (50 Questions)</button>
        <button onclick="showSection('flashcards')">Labelling Terms</button>
    </div>

    <div id="quiz-section" class="card">
        <div id="question-counter"></div>
        <div id="question-container">
            <p id="question-text" style="font-weight: bold; font-size: 1.1rem;"></p>
            <div id="options-container" class="options"></div>
        </div>
        <p id="quiz-feedback" style="margin-top:15px; font-weight:bold; min-height: 24px;"></p>
        <button onclick="loadQuestion()" id="next-btn" class="hidden" style="margin-top:20px; background-color: var(--wset-gold);">Next Question</button>
    </div>

    <div id="flashcard-section" class="card hidden flashcard" onclick="flipCard()">
        <p style="font-size: 0.8rem; color: #777;">Click to Flip / Click again for New Card</p>
        <div id="flashcard-text" class="flashcard-content">Loading...</div>
    </div>
</div>

<script>
    const questions = [
        { q: "Which one of the following statements is true of Pinot Noir?", options: ["It is only used to make inexpensive, low-quality wines", "It typically has a deep colour and high levels of tannin", "Typical flavours include tropical fruit and citrus", "It is at its best when grown in cool or moderate climates"], correct: 3 },
        { q: "Which one of the following grape varieties is widely grown in South Africa?", options: ["Gewurztraminer", "Glera", "Semillon", "Chenin Blanc"], correct: 3 },
        { q: "A wine labelled as Pinot Grigio delle Venezie DOC is typically described as", options: ["sweet, full-bodied and complex", "dry, light-bodied and simple", "medium, full-bodied and complex", "sweet, light-bodied and simple"], correct: 1 },
        { q: "What are the ideal conditions for botrytis/noble rot to grow?", options: ["Cool nights and warm, dry mornings", "Warm, dry mornings and damp, misty afternoons", "Damp, misty mornings and rainy afternoons", "Damp, misty mornings and warm, dry afternoons"], correct: 3 },
        { q: "Which wine regions are both well known for outstanding-quality wines from the Cabernet Sauvignon grape?", options: ["Rhône Valley and Napa Valley", "Stellenbosch and Margaret River", "Barolo and Los Carneros", "Burgundy and Coonawarra"], correct: 1 },
        { q: "Amarone della Valpolicella DOCG is made from which grape variety?", options: ["Corvina", "Barbera", "Nebbiolo", "Verdicchio"], correct: 0 },
        { q: "Which one of the following is a French labelling term used to indicate a wine with a protected designation of origin (PDO)?", options: ["Appellation d'origine contrôlée", "Qualitätswein", "Denominazione di Origine Controllata", "Indication géographique protégée"], correct: 0 },
        { q: "Which of the following techniques are used to produce sweet wines?\n1. Juice extracted from grapes with high sugar\n2. Yeast is removed after fermentation completed\n3. Dry wine is blended with sweet wine", options: ["1 and 2 only", "1 and 3 only", "2 and 3 only", "1, 2 and 3"], correct: 1 },
        { q: "Which of the following pairs of wines should be well chilled before serving?", options: ["Sauternes and Tokaji Aszú", "Champagne and Beaujolais", "Shiraz and oaked Chardonnay", "Prosecco and Cabernet Sauvignon"], correct: 0 },
        { q: "Some red wines can age well for several years because they have", options: ["high tannins, low alcohol and low acidity", "low tannins, high alcohol and low acidity", "low tannins, concentrated fruit and low acidity", "high tannins, concentrated fruit and high acidity"], correct: 3 },
        { q: "A red wine with high tannins, high acidity and black-fruit, cedar and tobacco characteristics best describes", options: ["Meursault", "Margaux", "Beaune", "Beaujolais"], correct: 1 },
        { q: "Which describes ideal storage conditions for wine sealed with a cork?", options: ["The temperature should be warm", "The temperature should be cool and constant", "The bottle should be stored vertically", "The storage area should be in strong bright light"], correct: 1 },
        { q: "Youthful Sauvignon Blanc wines have flavours of", options: ["lemon, honey and nuts", "grass, grapefruit and passion fruit", "dried apricot, coconut and biscuit", "candy, mint and butter"], correct: 1 },
        { q: "Which one of the following statements is true?", options: ["Outstanding wines can only be made from hand-harvested grapes", "Outstanding wines can only be made from machine-harvested grapes", "Outstanding wines can be made from both hand- and machine-harvested grapes", "Outstanding wines cannot be made from machine-harvested grapes"], correct: 2 },
        { q: "Which grape varieties are commonly grown in Alsace?\n1. Pinot Gris\n2. Chardonnay\n3. Riesling\n4. Sémillon", options: ["1 and 2 only", "1 and 3 only", "2 and 4 only", "3 and 4 only"], correct: 1 },
        { q: "What does the pulp of a grape mainly contain?", options: ["Tannins and sugar", "Water and sugar", "Acid and tannins", "Sugar and yeast"], correct: 1 },
        { q: "Which one of the following has a reputation for premium quality Pinot Noir?", options: ["Montepulciano", "Navarra", "Oregon", "Mendoza"], correct: 2 },
        { q: "Which grape variety is used to make Beaujolais?", options: ["Glera", "Gamay", "Grenache", "Garganega"], correct: 1 },
        { q: "Appearance of a young Pouilly-Fumé:", options: ["Deep amber", "Pale lemon", "Deep gold", "Pale amber"], correct: 1 },
        { q: "Nose of a young Pouilly-Fumé:", options: ["Pronounced grass, asparagus, apple, wet stones", "Light apricot, honey, dried fruit, nuts", "Medium melon, butter, vanilla, smoke", "Medium passion fruit, vanilla, coffee"], correct: 0 },
        { q: "Palate of a young Pouilly-Fumé:", options: ["Dry with low acidity", "Medium sweetness with high acidity", "Dry with high acidity", "Dry with medium acidity"], correct: 2 },
        { q: "Grand Cru Classé is a labelling term most associated with which region?", options: ["Rhône", "Bordeaux", "Barolo", "Loire"], correct: 1 },
        { q: "Which of the following is a common labelling term for Port?", options: ["TBA", "DOC", "LBV", "PX"], correct: 2 },
        { q: "Which one of the following is an Italian black grape variety?", options: ["Verdicchio", "Cortese", "Corvina", "Chardonnay"], correct: 2 },
        { q: "A Barossa Valley Shiraz wine is typically", options: ["full-bodied with black-cherry, vanilla and coffee", "light-bodied with strawberry, leather, wet-leaf", "full-bodied with pineapple, butter, honey", "light-bodied with black-cherry, butter, leather"], correct: 0 },
        { q: "How does a vacuum system keep a wine fresh?", options: ["Pump used to add CO2", "Gas pushed into bottle to push out air", "Pump removes air from inside bottle", "Gas used to add fresh-fruit aromas"], correct: 2 },
        { q: "In the Northern Rhône, the best vineyards are planted", options: ["on north-facing hillsides", "on flat valley floor", "close to the coast", "on steep slopes"], correct: 3 },
        { q: "What is the correct sequence of events for most red winemaking?", options: ["Crushing, pressing, fermentation", "Crushing, fermentation, pressing", "Pressing, fermentation, crushing", "Pressing, crushing, fermentation"], correct: 1 },
        { q: "Which term on an Italian label indicates grapes were grown in the historic centre of a region?", options: ["Classico", "Crianza", "Riserva", "Cortese"], correct: 0 },
        { q: "The flavours of autolysis are", options: ["lemon and pineapple", "apple and cream", "biscuit and bread", "butter and cream"], correct: 2 },
        { q: "Pinotage is often blended with which varieties for a Cape Blend?", options: ["Chenin Blanc and Malbec", "Chenin Blanc and Merlot", "Cabernet Sauvignon and Viognier", "Cabernet Sauvignon and Merlot"], correct: 3 },
        { q: "Outstanding-quality Riesling produced in Australia comes from:", options: ["Hawke's Bay", "Clare Valley", "Central Valley", "Walker Bay"], correct: 1 },
        { q: "A Crianza wine from Rioja has", options: ["longer oak ageing than Reserva", "no oak ageing requirements", "some oak flavours", "only primary fruit flavours"], correct: 2 },
        { q: "Sparkling Asti is made from", options: ["Glera", "Moscato (Muscat)", "Chardonnay", "Pinot Noir"], correct: 1 },
        { q: "Which region is known for powerful, full-bodied wines made from Garnacha?", options: ["Priorat", "Pommard", "Pomerol", "Port"], correct: 0 },
        { q: "‘Sweet with flavours of almond and apple’ best describes a", options: ["Pale Cream Sherry", "Vintage Port", "Oloroso Sherry", "Ruby Port"], correct: 0 },
        { q: "Minervois AOC can be a blend of which grape varieties?", options: ["Grenache and Syrah", "Syrah and Viognier", "Tempranillo and Garnacha", "Syrah and Gamay"], correct: 0 },
        { q: "Used to add complexity to dry white wines:\n1. Blending\n2. Malolactic conversion\n3. Lees contact\n4. Barrel fermentation", options: ["1 and 2 only", "2, 3 and 4 only", "1 and 4 only", "1, 2, 3 and 4"], correct: 3 },
        { q: "Which grape variety is used to make Meursault?", options: ["Chardonnay", "Cabernet Sauvignon", "Sauvignon Blanc", "Syrah"], correct: 0 },
        { q: "Recommend a simple, fruity red wine for immediate drinking:", options: ["Tokaji Aszú", "Chianti Classico Riserva", "Barolo", "Côtes du Rhône"], correct: 3 },
        { q: "In Champagne production, disgorgement is the process of", options: ["blending still wines", "moving lees towards the neck", "removing lees from the bottle", "adding sugar and yeast to still wine"], correct: 2 },
        { q: "Grown successfully in cool and moderate climates:\n1. Merlot\n2. Pinot Noir\n3. Riesling\n4. Sauvignon Blanc", options: ["1 and 2 only", "2 and 3 only", "2, 3 and 4 only", "1, 3 and 4 only"], correct: 2 },
        { q: "Which grape is widely used in Spanish rosé production?", options: ["Pinotage", "Garnacha", "Malbec", "Carmenère"], correct: 1 },
        { q: "The solera system is a method of", options: ["adding sweetness to Port", "blending and ageing Sherry", "removing yeast from Champagne", "drying grapes before fermentation"], correct: 1 },
        { q: "Malbec is the most important grape in", options: ["Australia", "Argentina", "Chile", "South Africa"], correct: 1 },
        { q: "In Bordeaux, outstanding dry white wines are usually made from", options: ["Sauvignon Blanc and Chenin Blanc", "Chardonnay and Sémillon", "Chenin Blanc and Chardonnay", "Sauvignon Blanc and Sémillon"], correct: 3 },
        { q: "In which season do flower clusters form?", options: ["Summer", "Spring", "Winter", "Autumn"], correct: 1 },
        { q: "Which region has a reputation for outstanding-quality Chardonnay?", options: ["Burgundy", "Alsace", "Bordeaux", "Rías Baixas"], correct: 0 },
        { q: "Opening sparkling wine safely involves:\n1. Chill the wine\n2. Hold cork securely once wire loosened\n3. Turn bottle gently while holding cork", options: ["1 only", "1 and 3 only", "1 and 2 only", "1, 2 and 3"], correct: 3 },
        { q: "Sweet with high acidity, low alcohol and dried-apricot/honey characteristics:", options: ["Pouilly-Fumé", "Pouilly-Fuissé", "Trockenbeerenauslese", "Sauternes"], correct: 2 }
    ];

    const terms = [
        { front: "Classico", back: "Historic centre of an Italian region [cite: 2698, 2936]" },
        { front: "Crianza", back: "Spanish term for wines with some oak ageing [cite: 2562]" },
        { front: "Riserva", back: "Italian wine with specific longer ageing [cite: 2986]" },
        { front: "LBV", back: "Late Bottled Vintage Port [cite: 3224]" },
        { front: "Appassimento", back: "Using dried grapes to concentrate sugar/flavors [cite: 2923]" },
        { front: "Autolysis", back: "Bread/biscuit notes from dead yeast cells [cite: 3058]" },
        { front: "Noble Rot", back: "Fungus (Botrytis) used for sweet wines [cite: 782]" },
        { front: "Disgorgement", back: "Removal of lees sediment from sparkling wine [cite: 3080]" },
        { front: "Solera", back: "System of fractional blending used in Sherry [cite: 3269]" },
        { front: "Fortification", back: "Adding alcohol to stop fermentation or strengthen wine [cite: 3232]" }
    ];

    let currentQuestionIndex = 0;
    let cardIndex = 0;
    let isFront = true;

    function showSection(section) {
        document.getElementById('quiz-section').classList.toggle('hidden', section !== 'quiz');
        document.getElementById('flashcard-section').classList.toggle('hidden', section !== 'flashcards');
        if (section === 'quiz') {
            currentQuestionIndex = 0;
            loadQuestion();
        } else {
            loadCard();
        }
    }

    function loadQuestion() {
        if (currentQuestionIndex >= questions.length) currentQuestionIndex = 0;
        const q = questions[currentQuestionIndex];
        document.getElementById('question-counter').innerText = `Question ${currentQuestionIndex + 1} of 50`;
        document.getElementById('question-text').innerText = q.q;
        document.getElementById('quiz-feedback').innerText = "";
        document.getElementById('next-btn').classList.add('hidden');
        
        const container = document.getElementById('options-container');
        container.innerHTML = "";
        q.options.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = "option-btn";
            btn.innerText = opt;
            btn.onclick = (e) => checkAnswer(idx, q.correct, e.target);
            container.appendChild(btn);
        });
    }

    function checkAnswer(selected, correct, targetBtn) {
        const buttons = document.querySelectorAll('.option-btn');
        buttons.forEach(b => b.disabled = true);
        
        if (selected === correct) {
            targetBtn.classList.add('correct');
            document.getElementById('quiz-feedback').innerText = "✅ Correct!";
            document.getElementById('quiz-feedback').style.color = "green";
        } else {
            targetBtn.classList.add('incorrect');
            buttons[correct].classList.add('correct');
            document.getElementById('quiz-feedback').innerText = "❌ Incorrect.";
            document.getElementById('quiz-feedback').style.color = "red";
        }
        currentQuestionIndex++;
        document.getElementById('next-btn').classList.remove('hidden');
    }

    function loadCard() {
        cardIndex = Math.floor(Math.random() * terms.length);
        isFront = true;
        document.getElementById('flashcard-text').innerText = terms[cardIndex].front;
    }

    function flipCard() {
        if (isFront) {
            document.getElementById('flashcard-text').innerText = terms[cardIndex].back;
            isFront = false;
        } else {
            loadCard();
        }
    }

    showSection('quiz');
</script>

</body>
</html>
